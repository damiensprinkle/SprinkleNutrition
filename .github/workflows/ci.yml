name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available iPhone

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme FlexSprinkle -project Soleus.xcodeproj

      - name: Build and run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme FlexSprinkle \
            -project Soleus.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcbeautify --is-ci || true

          # Check if tests actually passed by looking at the log
            if grep -q "\*\* TEST SUCCEEDED \*\*" build.log; then
              echo "Tests passed!"
            else
              echo "Tests failed!"
              exit 1
            fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Generate coverage report
        if: success()
        run: |
          # Print human-readable coverage summary
          xcrun xccov view --report TestResults.xcresult > coverage-report.txt
          echo "## Coverage Summary"
          echo ""
          # Show only the Soleus target lines (skip system frameworks)
          grep -E "^Soleus|\.swift" coverage-report.txt | head -60
          echo ""
          # Extract overall target coverage percentage
          echo "### Overall Coverage"
          xcrun xccov view --report --only-targets TestResults.xcresult

      - name: Post coverage to PR
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const report = execSync('xcrun xccov view --report --only-targets TestResults.xcresult').toString();

            const body = `## Code Coverage Report\n\n\`\`\`\n${report}\n\`\`\`\n\n> Generated by CI`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report.txt
          retention-days: 30
